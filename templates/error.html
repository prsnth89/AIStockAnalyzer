<!DOCTYPE html>
<html>
<head>
    <title>Error</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        h1 { color: #e74c3c; }
        .error-box { background: #ffebee; padding: 20px; border-radius: 5px; border-left: 4px solid #e74c3c; margin: 20px 0; }
        .back-link { display: inline-block; margin-top: 20px; color: #3498db; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>Error</h1>
    
    <div class="error-box">
        <p><strong>Oops!</strong> Something went wrong.</p>
        <p>{{ error }}</p>
        <p>Please try again with a valid US stock ticker (e.g., AAPL, MSFT, TSLA)</p>
    </div>
    
    <a href="/" class="back-link">← Back to home</a>
</body>
</html>
